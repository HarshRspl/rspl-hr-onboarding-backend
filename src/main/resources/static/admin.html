<script>
  const API_URL = window.APP_CONFIG?.API_BASE
               || window.API_BASE
               || "https://rspl-hr-onboarding-backend-production.up.railway.app/api";

  // ── Auth Guard ──────────────────────────────────────────────────────────────
  const HR_TOKEN = localStorage.getItem("hr_token");
  const HR_NAME  = localStorage.getItem("hr_name") || "User";
  const HR_ROLE  = localStorage.getItem("hr_role") || "";

  if (!HR_TOKEN) window.location.href = "login.html?next=admin.html";
  if ((HR_ROLE || "").toUpperCase() !== "HR_ADMIN") {
    alert("Access denied: Admin portal requires HR_ADMIN role");
    window.location.href = "dashboard.html";
  }

  const badgeEl = document.getElementById("userBadge");
  if (badgeEl) badgeEl.textContent = `${HR_NAME} (${HR_ROLE})`;

  // ── authFetch ───────────────────────────────────────────────────────────────
  function authFetch(url, options = {}) {
    options.headers = options.headers || {};
    options.headers["Authorization"] = "Bearer " + HR_TOKEN;
    if (!options.headers["Content-Type"] && options.body)
      options.headers["Content-Type"] = "application/json";
    return fetch(url, options).then(res => {
      if (res.status === 401 || res.status === 403) {
        localStorage.clear();
        window.location.href = "login.html?next=admin.html";
        throw new Error("Session expired");
      }
      return res;
    });
  }

  window.addEventListener("DOMContentLoaded", () => {
    const apiInput = document.getElementById("apiUrl");
    if (apiInput) apiInput.value = API_URL.replace("/api", "");
    refreshDashboard();
  });

  // ── Navigation ──────────────────────────────────────────────────────────────
  function showSection(sectionId, el) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(sectionId).classList.add("active");
    document.querySelectorAll(".nav-link").forEach(n => n.classList.remove("active"));
    if (el) el.classList.add("active");

    const loaders = {
      candidates: () => { loadCandidates(); populateHRDropdown(); },
      "hr-team":  () => loadHRTeam(),
      dashboard:  () => refreshDashboard(),
      reports:    () => generateReport()
    };
    loaders[sectionId]?.();
  }

  // ── Dashboard Stats (real data) ─────────────────────────────────────────────
  function refreshDashboard() {
    authFetch(`${API_URL}/hr/candidates/stats`)
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          const s = data.data;
          document.getElementById("totalCandidates").textContent = s.total         || 0;
          document.getElementById("pendingCount").textContent    = s.INITIATED      || 0;
          document.getElementById("completedCount").textContent  = s.APPROVED       || 0;
        }
      })
      .catch(() => showAlert("statsAlert", "Error loading statistics", "error"));

    authFetch(`${API_URL}/hr/team`)
      .then(r => r.json())
      .then(data => {
        document.getElementById("totalHR").textContent = data.data?.length || 0;
      })
      .catch(e => console.error("HR team error:", e));
  }

  // ── HR Dropdown ─────────────────────────────────────────────────────────────
  function populateHRDropdown() {
    authFetch(`${API_URL}/hr/team`)
      .then(r => r.json())
      .then(data => {
        const select = document.getElementById("candHR");
        select.innerHTML = '<option value="">Select HR Member</option>';
        (data.data || []).forEach(hr => {
          const opt = document.createElement("option");
          opt.value = hr.id;
          opt.textContent = hr.name;
          select.appendChild(opt);
        });
      });
  }

  // ── Create Candidate ────────────────────────────────────────────────────────
  function createCandidate() {
    const candidate = {
      employeeName:        document.getElementById("candName").value.trim(),
      emailId:             document.getElementById("candEmail").value.trim(),
      mobileNo:            document.getElementById("candMobile").value.trim(),
      designation:         document.getElementById("candDesignation").value.trim(),
      aadhaarNo:           document.getElementById("candAadhaar").value.trim() || null,
      assignedHRId:        document.getElementById("candHR").value
                           ? parseInt(document.getElementById("candHR").value, 10) : null,
      initiatedBy:         "admin",
      sendLinkImmediately: true
    };

    if (!candidate.employeeName || !candidate.emailId ||
        !candidate.mobileNo     || !candidate.designation) {
      showAlert("candidatesAlert", "Please fill all required fields", "error");
      return;
    }

    authFetch(`${API_URL}/hr/candidates/initiate`, {
      method: "POST", body: JSON.stringify(candidate)
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        showAlert("candidatesAlert", "Candidate created successfully!", "success");
        clearCandidateForm();
        loadCandidates();
      } else {
        showAlert("candidatesAlert", data.message || "Error creating candidate", "error");
      }
    })
    .catch(() => showAlert("candidatesAlert", "Error creating candidate", "error"));
  }

  function clearCandidateForm() {
    ["candName","candEmail","candMobile","candDesignation","candAadhaar","candHR"]
      .forEach(id => document.getElementById(id).value = "");
  }

  // ── Candidates Table ─────────────────────────────────────────────────────────
  function loadCandidates() {
    authFetch(`${API_URL}/hr/candidates?page=0&size=50`)
      .then(r => r.json())
      .then(data => {
        const tbody   = document.getElementById("candidatesTable");
        const content = data.data?.content || [];

        tbody.innerHTML = content.length
          ? content.map(c => `
              <tr>
                <td><strong>${c.employeeName}</strong></td>
                <td>${c.emailId || "–"}</td>
                <td>${c.mobileNo || "–"}</td>
                <td>${c.designation || "–"}</td>
                <td><span class="badge badge-info">${(c.joiningStatus||"").replace(/_/g," ")}</span></td>
                <td>${c.assignedHr?.name || "–"}</td>
                <td>
                  <button class="btn-primary" style="padding:5px 10px;font-size:12px;"
                          onclick="editCandidate(${c.id})">Edit</button>
                </td>
              </tr>`).join("")
          : '<tr><td colspan="7" style="text-align:center;padding:40px;">No candidates found</td></tr>';
      })
      .catch(() => showAlert("candidatesAlert", "Error loading candidates", "error"));
  }

  // ── HR Team Table ────────────────────────────────────────────────────────────
  function loadHRTeam() {
    authFetch(`${API_URL}/hr/team`)
      .then(r => r.json())
      .then(data => {
        const tbody = document.getElementById("hrTable");
        const team  = data.data || [];

        tbody.innerHTML = team.length
          ? team.map(hr => `
              <tr>
                <td>${hr.id}</td>
                <td><strong>${hr.name}</strong></td>
                <td>${hr.email || "–"}</td>
                <td>${hr.department || "HR"}</td>
                <td>${hr.role || "–"}</td>
              </tr>`).join("")
          : '<tr><td colspan="5" style="text-align:center;padding:40px;">No HR team members found</td></tr>';
      })
      .catch(() => showAlert("hrAlert", "Error loading HR team", "error"));
  }

  // ── Reports ──────────────────────────────────────────────────────────────────
  function generateReport() {
    authFetch(`${API_URL}/hr/candidates/stats`)
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          const s    = data.data;
          const rate = s.total > 0 ? Math.round((s.APPROVED / s.total) * 100) : 0;
          document.getElementById("reportTotal").textContent     = s.total         || 0;
          document.getElementById("reportCompleted").textContent = s.APPROVED       || 0;
          document.getElementById("reportPending").textContent   = s.INITIATED      || 0;
          document.getElementById("reportRate").textContent      = rate + "%";
          document.getElementById("lastUpdated").textContent     = new Date().toLocaleTimeString();
        }
      })
      .catch(e => console.error("Report error:", e));
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function showAlert(elementId, message, type) {
    const el = document.getElementById(elementId);
    if (el) {
      el.className = `alert alert-${type} show`;
      el.textContent = message;
      setTimeout(() => el.classList.remove("show"), 5000);
    }
  }

  function editCandidate(id) {
    alert("Edit functionality for candidate " + id);
  }

  function logout() {
    if (confirm("Are you sure you want to logout?")) {
      localStorage.clear();
      window.location.href = "login.html";
    }
  }
</script>
